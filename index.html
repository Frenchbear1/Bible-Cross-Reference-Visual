<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bible Cross-Reference Arcs</title>
  <meta name="theme-color" content="#efe9dc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Bible Cross-References">
  <meta name="application-name" content="Bible Cross-References">
  <meta name="msapplication-config" content="./browserconfig.xml">
  <meta name="msapplication-TileColor" content="#efe9dc">
  <meta name="msapplication-TileImage" content="./icons/icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="./icons/icon-48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
  <style>
    :root {
      --bg-top: #f7f6f1;
      --bg-bottom: #efe9dc;
      --bg-glow: rgba(255, 255, 255, 0.8);
      --bg-glow-clear: rgba(255, 255, 255, 0);
      --ink: #2f2a24;
      --muted: #6c6257;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(72, 60, 46, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 8%, var(--bg-glow) 0%, var(--bg-glow-clear) 40%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      min-height: 100vh;
    }

    body[data-theme="white"] {
      --bg-top: #ffffff;
      --bg-bottom: #f4f5f7;
      --bg-glow: rgba(255, 255, 255, 0.92);
      --bg-glow-clear: rgba(255, 255, 255, 0);
      --ink: #222a33;
      --muted: #586272;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-border: rgba(72, 86, 104, 0.2);
    }

    body[data-theme="dark"] {
      --bg-top: #181c21;
      --bg-bottom: #101318;
      --bg-glow: rgba(133, 167, 202, 0.22);
      --bg-glow-clear: rgba(133, 167, 202, 0);
      --ink: #ebf1f8;
      --muted: #b7c2cd;
      --panel: rgba(22, 28, 34, 0.78);
      --panel-border: rgba(208, 220, 232, 0.2);
    }

    .shell {
      width: min(1320px, 96vw);
      margin: 1.25rem auto 1.5rem;
      display: grid;
      gap: 0.9rem;
    }

    .topbar {
      display: grid;
      gap: 0.65rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 0.8rem 0.9rem;
      backdrop-filter: blur(5px);
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.3rem);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1.1fr) auto auto auto auto auto auto minmax(220px, 1.6fr);
      gap: 0.55rem;
      align-items: center;
    }

    .controls input,
    .controls button {
      border-radius: 10px;
      border: 1px solid rgba(87, 72, 54, 0.25);
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      font-size: 0.9rem;
      padding: 0.52rem 0.65rem;
    }

    .controls button {
      cursor: pointer;
      font-weight: 600;
    }

    .controls button.hidden {
      display: none;
    }

    #show-all-btn[aria-pressed="true"] {
      background: rgba(60, 123, 190, 0.14);
      border-color: rgba(46, 97, 154, 0.48);
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.98);
    }

    body[data-theme="dark"] .controls input,
    body[data-theme="dark"] .controls button,
    body[data-theme="dark"] .filter-field select,
    body[data-theme="dark"] .chip,
    body[data-theme="dark"] #selected-verse-box {
      border-color: rgba(205, 218, 232, 0.3);
      background: rgba(33, 40, 48, 0.9);
      color: #ebf1f8;
    }

    body[data-theme="dark"] .controls button:hover,
    body[data-theme="dark"] .chip:hover {
      background: rgba(44, 53, 63, 0.96);
    }

    body[data-theme="dark"] #clear-filters-btn {
      border-color: rgba(212, 166, 142, 0.52);
      background: linear-gradient(180deg, rgba(76, 52, 43, 0.9), rgba(58, 39, 32, 0.95));
      color: #ffd8c5;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.09);
    }

    body[data-theme="dark"] #selected-verse-title {
      color: #c3ccd7;
    }

    body[data-theme="dark"] .loading {
      background: rgba(20, 24, 30, 0.9);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      align-items: end;
      justify-content: start;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(-3px);
      transition: max-height 180ms ease, opacity 140ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .filter-row.open {
      max-height: 120px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .filter-field {
      display: grid;
      gap: 0.22rem;
      width: max-content;
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .filter-field select {
      border-radius: 10px;
      border: 1px solid rgba(87, 72, 54, 0.25);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      font-size: 0.86rem;
      padding: 0.48rem 0.6rem;
      font-family: "Cascadia Mono", "Consolas", "Courier New", monospace;
      width: auto;
      min-width: 0;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: none;
    }

    #clear-filters-btn {
      border-radius: 10px;
      border: 1px solid rgba(134, 73, 45, 0.42);
      background: linear-gradient(180deg, rgba(255, 249, 244, 0.98), rgba(246, 230, 219, 0.98));
      color: #603927;
      font-size: 0.86rem;
      font-weight: 700;
      padding: 0.48rem 0.78rem;
      cursor: pointer;
      height: 37px;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    #clear-filters-btn:hover {
      background: linear-gradient(180deg, rgba(255, 253, 250, 1), rgba(243, 221, 205, 1));
    }

    #clear-filters-btn:active {
      transform: translateY(1px);
    }

    #filter-toggle-btn[aria-expanded="true"] {
      background: rgba(60, 123, 190, 0.14);
      border-color: rgba(46, 97, 154, 0.48);
    }

    .chart-card {
      position: relative;
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.62);
      overflow: hidden;
    }

    #chart {
      width: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 1rem;
      color: var(--muted);
      background: rgba(249, 246, 239, 0.9);
      backdrop-filter: blur(2px);
      z-index: 2;
      text-align: center;
      padding: 1rem;
    }

    .loading.hidden {
      display: none;
    }

    .info {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.6rem;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
    }

    .info-line {
      margin: 0;
      font-size: 0.92rem;
    }

    #target-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.34rem;
      max-height: 7.8rem;
      overflow: auto;
      padding-right: 0.25rem;
    }

    .chip {
      border: 1px solid rgba(87, 72, 54, 0.2);
      border-radius: 999px;
      padding: 0.18rem 0.5rem;
      background: rgba(255, 255, 255, 0.88);
      color: #2f2a24;
      font-size: 0.79rem;
      line-height: 1.3;
      cursor: pointer;
      white-space: nowrap;
    }

    .chip:hover {
      background: rgba(255, 255, 255, 0.99);
    }

    #selected-verse-box {
      border: 1px solid rgba(87, 72, 54, 0.18);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.88);
      padding: 0.6rem 0.7rem;
    }

    #selected-verse-title {
      margin: 0 0 0.24rem 0;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    #selected-verse-text {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.46;
      color: var(--ink);
    }

    .footer {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: right;
    }

    @media (max-width: 900px) {
      .shell {
        width: min(1320px, 98vw);
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .filter-row {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <h1 class="title">Bible Cross-Reference Arc Explorer</h1>
      <p class="subtitle">Show All is static. Wheel to zoom at cursor. In single mode: click once to freeze, click again to unfreeze.</p>
      <div class="controls">
        <input id="verse-input" type="text" placeholder="Try: John 3:16 or Gen.1.1" autocomplete="off">
        <button id="show-all-btn" type="button">Show All</button>
        <button id="reset-zoom-btn" type="button" class="hidden">Reset Zoom</button>
        <button id="go-btn" type="button">Go</button>
        <button id="random-btn" type="button">Random</button>
        <button id="filter-toggle-btn" type="button" aria-expanded="false" aria-controls="filter-row">Filter</button>
        <button id="theme-toggle-btn" type="button" aria-label="Switch color theme">Theme: Sepia</button>
        <input id="verse-slider" type="range" min="1" max="31102" value="1">
      </div>
      <div id="filter-row" class="filter-row" aria-hidden="true">
        <label class="filter-field" for="filter-testament">
          Target Testament
          <select id="filter-testament">
            <option value="all">All Testaments</option>
            <option value="ot">Old Testament</option>
            <option value="nt">New Testament</option>
          </select>
        </label>
        <label class="filter-field" for="filter-book">
          Target Book
          <select id="filter-book">
            <option value="all">All Books</option>
          </select>
        </label>
        <label class="filter-field" for="filter-chapter">
          Target Chapter
          <select id="filter-chapter">
            <option value="all">All Chapters</option>
          </select>
        </label>
        <label class="filter-field" for="filter-scope">
          Scope
          <select id="filter-scope">
            <option value="all">All Books</option>
            <option value="book">Same Book Only</option>
            <option value="chapter">Same Chapter Only</option>
          </select>
        </label>
        <button id="clear-filters-btn" type="button">Clear Filters</button>
      </div>
    </section>

    <section class="chart-card">
      <canvas id="chart"></canvas>
      <div id="loading" class="loading">Loading verse graph...</div>
    </section>

    <section class="info">
      <p class="info-line" id="selected-line">Selected: -</p>
      <p class="info-line" id="reference-line">Outgoing references: -</p>
      <div id="target-list" aria-live="polite"></div>
      <div id="selected-verse-box">
        <p id="selected-verse-title">KJV</p>
        <p id="selected-verse-text">Loading KJV text...</p>
      </div>
    </section>

    <div class="footer" id="source-line">Source: loading...</div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
